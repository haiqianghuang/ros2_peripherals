module: middleware/ros2/peripherals/misc_io

tests:
  - name: misc-io-ros-functional
    description: Verifies Misc IO ROS commands drive output backends and input callbacks publish MiscIoEvent messages.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash middleware/ros2/peripherals/misc_io/tests/test_misc_io_ros_contract.sh functional

  - name: misc-io-ros-error-paths
    description: Verifies invalid IO configuration and commands targeting inputs are rejected without output writes.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash middleware/ros2/peripherals/misc_io/tests/test_misc_io_ros_contract.sh error-paths

  - name: misc-io-hardware-smoke
    description: Manually verifies configured GPIO misc IO can generate callbacks on real hardware through the native smoke test.
    category: functional
    scopes: [manual]
    timeout_s: 180
    workdir: sdk
    requires:
      hardware:
        - GPIO line configured for MISC_IO_HW_CHIP and MISC_IO_HW_LINE.
      supervision: true
    command: |
      bash components/peripherals/misc_io/tests/test_hw_misc_io_smoke.sh
