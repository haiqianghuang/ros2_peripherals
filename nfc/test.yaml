module: middleware/ros2/peripherals/nfc

tests:
  - name: nfc-ros-functional
    description: Verifies NFC poll/read/write ROS services convert fake backend tag and block data into expected responses.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash middleware/ros2/peripherals/nfc/tests/test_nfc_ros_contract.sh functional

  - name: nfc-ros-error-paths
    description: Verifies bad transport/device configuration, short write data, and no-tag poll responses are handled.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash middleware/ros2/peripherals/nfc/tests/test_nfc_ros_contract.sh error-paths

  - name: nfc-hardware-smoke
    description: Manually verifies a real SI512 NFC reader can poll/read/write through the native hardware smoke test.
    category: functional
    scopes: [manual]
    timeout_s: 300
    workdir: sdk
    requires:
      hardware:
        - SI512 NFC reader on NFC_I2C_DEV or board default bus.
      supervision: true
    command: |
      bash components/peripherals/nfc/tests/test_hw_si512_i2c_smoke.sh
