module: middleware/ros2/peripherals/light_sensor

tests:
  - name: light-sensor-ros-functional
    description: Verifies fake lux samples are polled and published as sensor_msgs Illuminance with configured frame and variance.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash middleware/ros2/peripherals/light_sensor/tests/test_light_sensor_ros_contract.sh functional

  - name: light-sensor-ros-error-paths
    description: Verifies invalid I2C addresses, missing devices, and transient poll errors fail or skip publishing as expected.
    category: functional
    scopes: [pr]
    timeout_s: 120
    workdir: sdk
    command: |
      bash middleware/ros2/peripherals/light_sensor/tests/test_light_sensor_ros_contract.sh error-paths

  - name: light-sensor-hardware-smoke
    description: Manually verifies the W1160 light sensor can initialize and return real lux samples through the native smoke test.
    category: functional
    scopes: [manual]
    timeout_s: 180
    workdir: sdk
    requires:
      hardware:
        - W1160 light sensor on LIGHT_SENSOR_I2C_DEV or the board default I2C bus.
      supervision: true
    command: |
      bash components/peripherals/light_sensor/tests/test_hw_w1160_i2c_smoke.sh
